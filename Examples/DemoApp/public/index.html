<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Run-Through Demo — Tiny Café</title>
<style>
  :root { font-family: -apple-system, system-ui, sans-serif; }
  body { max-width: 560px; margin: 2rem auto; padding: 0 1rem; color: #1b1b1b; }
  h1 { font-size: 1.4rem; }
  .muted { color: #666; }
  ul { list-style: none; padding: 0; }
  li { display: flex; justify-content: space-between; align-items: center;
       padding: .6rem .8rem; border: 1px solid #e5e5e5; border-radius: 10px; margin: .4rem 0; }
  button { font: inherit; padding: .4rem .8rem; border-radius: 8px; border: 1px solid #ccc;
           background: #fafafa; cursor: pointer; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  #place-order { background: #1b6e3c; color: #fff; border-color: #1b6e3c; width: 100%; padding: .7rem; margin-top: 1rem; }
  #confirm { margin-top: 1rem; padding: 1rem; background: #eaf6ee; border: 1px solid #1b6e3c; border-radius: 10px; }
  [hidden] { display: none !important; }
  .bar { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
</style>
</head>
<body>
  <h1>Tiny Café <span class="muted">— Run-Through demo</span></h1>
  <p class="muted">Add items, place the order. The menu comes from <code>GET /api/menu</code>
     and the order goes to <code>POST /api/order</code> — both mocked in the test.</p>

  <ul id="menu" data-testid="menu"></ul>

  <div class="bar">
    <span>Cart: <strong id="cart-count" data-testid="cart-count">0</strong> item(s)</span>
    <button id="clear" data-testid="clear">Clear</button>
  </div>

  <button id="place-order" data-testid="place-order" disabled>Place order</button>

  <div id="confirm" data-testid="confirm" hidden>
    ✅ Order <strong id="order-id" data-testid="order-id"></strong> placed — thanks!
  </div>

<script>
  // Built-in fallback menu so a human opening this file directly still sees
  // something. The test mocks /api/menu with a DIFFERENT menu to prove the mock
  // is what rendered.
  const FALLBACK = [
    { id: 'latte', name: 'Latte', price: 4.5 },
    { id: 'bun',   name: 'Cinnamon Bun', price: 5.0 },
  ];
  const CART_KEY = 'rt-demo-cart';
  const cart = new Map(); // id -> qty

  const $ = (s) => document.querySelector(s);

  function persist() {
    localStorage.setItem(CART_KEY, JSON.stringify([...cart.entries()]));
  }
  function restore() {
    // Mode B seam: tests seed this localStorage key to start from a given cart.
    try {
      const saved = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
      for (const [id, qty] of saved) cart.set(id, qty);
    } catch { /* ignore */ }
  }
  function totalItems() { return [...cart.values()].reduce((a, b) => a + b, 0); }

  function renderCart() {
    $('#cart-count').textContent = String(totalItems());
    $('#place-order').disabled = totalItems() === 0;
  }

  async function loadMenu() {
    let items = FALLBACK;
    try {
      const res = await fetch('/api/menu');
      if (res.ok) { const data = await res.json(); if (Array.isArray(data.items)) items = data.items; }
    } catch { /* offline / static serve — use fallback */ }

    const ul = $('#menu');
    ul.innerHTML = '';
    for (const it of items) {
      const li = document.createElement('li');
      li.dataset.testid = `menu-item-${it.id}`;
      li.innerHTML = `<span>${it.name} <span class="muted">$${it.price.toFixed(2)}</span></span>`;
      const add = document.createElement('button');
      add.textContent = 'Add';
      add.dataset.testid = `add-${it.id}`;
      add.addEventListener('click', () => {
        cart.set(it.id, (cart.get(it.id) || 0) + 1);
        persist(); renderCart();
      });
      li.appendChild(add);
      ul.appendChild(li);
    }
  }

  async function placeOrder() {
    const body = { items: [...cart.entries()].map(([id, qty]) => ({ id, qty })), count: totalItems() };
    const res = await fetch('/api/order', {
      method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body),
    });
    const data = await res.json();
    $('#order-id').textContent = String(data.id);
    $('#confirm').hidden = false;
  }

  restore();
  renderCart();
  loadMenu();
  $('#place-order').addEventListener('click', placeOrder);
  $('#clear').addEventListener('click', () => { cart.clear(); persist(); renderCart(); $('#confirm').hidden = true; });
</script>
</body>
</html>
